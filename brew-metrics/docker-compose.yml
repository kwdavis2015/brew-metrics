services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brewadmin
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: brewmetrics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://brewadmin:localdev@db:5432/brewmetrics
    depends_on:
      - db

volumes:
  pgdata:
